<h1 class="text-headline-lg font-headline-lg text-on-surface tracking-tight">What technical areas do you work with?</h1>
<p class="text-body-md text-on-surface-variant">Select the algorithms and systems that define your technical stack.</p>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-base max-h-[512px] overflow-y-auto pr-2 pb-4 scroll-smooth" id="techGrid">
<!-- Cards will be populated by JS -->
<script>
                const techs = [
                    { id: 'ml', label: 'Machine Learning Algorithms', icon: 'psychology' },
                    { id: 'dl', label: 'Deep Learning Models', icon: 'neurology' },
                    { id: 'opt', label: 'Optimization Algorithms', icon: 'speed' },
                    { id: 'graph', label: 'Graph Algorithms', icon: 'hub' },
                    { id: 'search', label: 'Search Algorithms', icon: 'manage_search' },
                    { id: 'sort', label: 'Sorting Algorithms', icon: 'sort' },
                    { id: 'recsys', label: 'Recommendation Systems', icon: 'auto_awesome' },
                    { id: 'neural', label: 'Neural Networks', icon: 'stream' },
                    { id: 'cv', label: 'Computer Vision Models', icon: 'visibility' },
                    { id: 'nlp', label: 'Natural Language Processing', icon: 'translate' },
                    { id: 'dist', label: 'Distributed Systems', icon: 'cloud_sync' },
                    { id: 'dbopt', label: 'Database Query Optimization', icon: 'database' },
                    { id: 'net', label: 'Networking Algorithms', icon: 'lan' },
                    { id: 'crypto', label: 'Cryptography', icon: 'enhanced_encryption' },
                    { id: 'os', label: 'Operating Systems', icon: 'terminal' }
                ];

                const techGrid = document.getElementById('techGrid');
                
                techs.forEach(tech => {
                    const card = document.createElement('div');
                    card.className = 'tech-card flex items-center gap-3 p-4 bg-white/90 backdrop-blur-sm border border-outline-variant rounded-lg cursor-pointer transition-all duration-200 hover:border-primary/50 hover:bg-white active:scale-95 shadow-sm';
                    card.setAttribute('data-tech-id', tech.id);
                    card.innerHTML = `
                        <div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center text-primary shrink-0">
                            <span class="material-symbols-outlined">${tech.icon}</span>
                        </div>
                        <span class="text-body-sm font-medium text-on-surface">${tech.label}</span>
                    `;
                    
                    card.addEventListener('click', () => {
                        card.classList.toggle('selected-card');
                    });
                    
                    techGrid.appendChild(card);
                });

                // Search Filtering
                document.getElementById('techSearch').addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    document.querySelectorAll('.tech-card').forEach(card => {
                        const text = card.textContent.toLowerCase();
                        card.style.display = text.includes(query) ? 'flex' : 'none';
                    });
                });
            </script>
</div>

<!-- Background Shader Setup -->
<script>
    class WebGLShader extends HTMLElement {
        constructor() {
            super();
            this.canvas = document.createElement('canvas');
            this.gl = this.canvas.getContext('webgl');
        }

        connectedCallback() {
            this.appendChild(this.canvas);
            this.init();
            window.addEventListener('resize', () => this.resize());
        }

        init() {
            const gl = this.gl;
            const source = this.textContent.trim();
            this.textContent = '';

            const vertexShader = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vertexShader, `
                attribute vec2 position;
                varying vec2 v_texCoord;
                void main() {
                    v_texCoord = position * 0.5 + 0.5;
                    v_texCoord.y = 1.0 - v_texCoord.y;
                    gl_Position = vec4(position, 0.0, 1.0);
                }
            `);
            gl.compileShader(vertexShader);

            const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fragmentShader, source);
            gl.compileShader(fragmentShader);

            this.program = gl.createProgram();
            gl.attachShader(this.program, vertexShader);
            gl.attachShader(this.program, fragmentShader);
            gl.linkProgram(this.program);

            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

            const position = gl.getAttribLocation(this.program, 'position');
            gl.enableVertexAttribArray(position);
            gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

            this.resize();
            this.render();
        }

        resize() {
            this.canvas.width = this.clientWidth * window.devicePixelRatio;
            this.canvas.height = this.clientHeight * window.devicePixelRatio;
            this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
        }

        render(time = 0) {
            const gl = this.gl;
            gl.useProgram(this.program);

            const uTime = gl.getUniformLocation(this.program, 'u_time');
            gl.uniform1f(uTime, time * 0.001);

            const uRes = gl.getUniformLocation(this.program, 'u_resolution');
            gl.uniform2f(uRes, this.canvas.width, this.canvas.height);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame((t) => this.render(t));
        }
    }
    customElements.define('webgl-shader', WebGLShader);
</script>
